<style>
  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --surface-soft: #f8fafc;
    --line: #d8e2ea;
    --line-strong: #b8c8d6;
    --text: #142334;
    --muted: #60758d;
    --blue: #0b63ce;
    --navy: #123f73;
    --mint: #0f9f83;
    --amber: #c58a17;
    --red: #b42318;
    --shadow: 0 14px 34px rgba(22, 36, 43, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(12px);
  }

  .topbar-inner,
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 18px;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-top: 13px;
    padding-bottom: 13px;
  }

  .brand {
    min-width: 0;
  }

  .brand-kicker {
    margin: 0;
    color: var(--blue);
    font-size: 12px;
    font-weight: 900;
  }

  .brand-title {
    margin: 0;
    font-size: 16px;
    font-weight: 900;
  }

  .page {
    padding-top: 24px;
    padding-bottom: 36px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: end;
    margin-bottom: 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(135deg, #ffffff, #eef5ff);
    box-shadow: var(--shadow);
    padding: 22px;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 8px;
    font-size: 28px;
    line-height: 1.3;
  }

  h2 {
    margin-bottom: 14px;
    font-size: 18px;
  }

  h3 {
    margin-bottom: 10px;
    font-size: 15px;
  }

  .muted {
    color: var(--muted);
  }

  .generated {
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 10px 12px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .panel {
    margin-bottom: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .filters {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 12px;
  }

  label {
    display: block;
    color: var(--text);
    font-size: 13px;
    font-weight: 900;
  }

  select,
  input {
    width: 100%;
    min-height: 40px;
    margin-top: 6px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font: inherit;
    padding: 8px 10px;
    outline: none;
  }

  select:focus,
  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(11, 99, 206, 0.14);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: end;
  }

  button,
  .button {
    min-height: 40px;
    border: 0;
    border-radius: 8px;
    background: #e8eef2;
    color: #17313b;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 900;
    padding: 9px 13px;
    text-decoration: none;
  }

  button.primary {
    background: var(--blue);
    color: #fff;
  }

  button.csv {
    background: #ecfdf7;
    color: #07664f;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
  }

  .kpi {
    min-height: 104px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, #fff, var(--surface-soft));
    padding: 14px;
  }

  .kpi .label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .kpi .value {
    margin-top: 16px;
    color: var(--navy);
    font-size: 30px;
    font-weight: 950;
    line-height: 1;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th,
  td {
    min-width: 112px;
    border-bottom: 1px solid var(--line);
    padding: 9px 8px;
    text-align: left;
    vertical-align: top;
  }

  th {
    position: sticky;
    top: 66px;
    z-index: 5;
    background: #eef3f5;
    color: #233942;
    font-weight: 950;
  }

  tr:hover td {
    background: #f8fbff;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: #eef3f5;
    color: #26424d;
    font-size: 12px;
    font-weight: 900;
    padding: 4px 8px;
    white-space: nowrap;
  }

  .rank-s,
  .rank-a {
    background: #fff4d8;
    color: #805614;
  }

  .rank-b {
    background: #e9f3ff;
    color: #0c4a8a;
  }

  .status-published {
    background: #e4f8ef;
    color: #0b6a44;
  }

  .bar-list {
    display: grid;
    gap: 10px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: minmax(140px, 1fr) 2fr 48px;
    gap: 10px;
    align-items: center;
  }

  .bar-name {
    overflow: hidden;
    font-size: 13px;
    font-weight: 850;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    height: 12px;
    overflow: hidden;
    border-radius: 999px;
    background: #e6edf0;
  }

  .bar-fill {
    height: 100%;
    min-width: 4px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--blue), #2b8cff);
  }

  .bar-count {
    color: var(--navy);
    font-weight: 950;
    text-align: right;
  }

  .detail {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .detail-item {
    border-bottom: 1px solid var(--line);
    padding-bottom: 9px;
  }

  .detail-label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .detail-value {
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .empty,
  .loading {
    border: 1px dashed var(--line-strong);
    border-radius: 8px;
    color: var(--muted);
    font-weight: 850;
    padding: 20px;
    text-align: center;
  }

  @media (max-width: 1100px) {
    .filters,
    .kpi-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 820px) {
    .hero,
    .grid,
    .detail {
      grid-template-columns: 1fr;
    }

    .filters,
    .kpi-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .generated {
      white-space: normal;
    }
  }

  @media (max-width: 620px) {
    .topbar-inner,
    .page {
      padding-left: 12px;
      padding-right: 12px;
    }

    .hero,
    .panel {
      padding: 15px;
    }

    h1 {
      font-size: 23px;
    }

    .filters,
    .kpi-grid {
      grid-template-columns: 1fr;
    }

    .bar-row {
      grid-template-columns: 1fr 48px;
    }

    .bar-track {
      grid-column: 1 / -1;
      order: 3;
    }
  }
</style>
